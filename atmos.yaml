base_path: "."

components:
  terraform:
    base_path: components/terraform
    apply_auto_approve: false
    deploy_run_init: true
    init_run_reconfigure: true
    auto_generate_backend_file: true
  helmfile:
    base_path: components/helmfile
    use_eks: false
    kubeconfig_path: "{{ .vars.kube_config_path }}"
    helm_aws_profile_pattern: ""
    cluster_name_pattern: ""
  ansible:
    base_path: components/ansible

stacks:
  base_path: stacks
  included_paths:
    - "deploy/**/*"
  excluded_paths:
    - "**/_defaults.yaml"
  name_pattern: "{stage}"

workflows:
  base_path: stacks/workflows

logs:
  file: "/dev/stderr"
  level: Info

settings:
  list_merge_strategy: replace
  telemetry:
    enabled: false