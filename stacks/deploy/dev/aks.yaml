import:
  - orgs/homelab/_defaults
  - catalog/terraform/resource-group
  - catalog/terraform/network
  - catalog/terraform/storage
  - catalog/terraform/aks
  - catalog/terraform/key-vault
  - catalog/ansible/aks-config
  - catalog/helmfile/external-secrets
  - catalog/helmfile/ingress
  - catalog/helmfile/demo-app

vars:
  environment: ue2
  stage: dev
  region: eastus2

components:
  terraform:
    resource-group:
      vars:
        name: rg

    network:
      vars:
        name: vnet
        vnet_address_space:
          - "10.10.0.0/16"
        aks_subnet_prefix: "10.10.1.0/24"

    storage:
      vars:
        name: storage
        account_replication_type: LRS
        blob_containers:
          - name: app-data
            access_type: private
        file_shares:
          - name: app-files
            quota: 50

    aks:
      vars:
        name: aks
        kubernetes_version: "1.35"
        system_node_count: 3
        system_node_vm_size: Standard_B2s_v2
        user_node_count: 2
        user_node_vm_size: Standard_B4s_v2

    key-vault:
      vars:
        name: kv
        purge_protection_enabled: false

  ansible:
    aks-config:
      vars:
        aks_resource_group_name: homelab-ue2-dev-rg
        aks_cluster_name_override: homelab-ue2-dev-aks
        namespaces:
          - demo-app
          - ingress
          - external-secrets

  helmfile:
    external-secrets:
      vars:
        chart_version: "0.10.7"

    ingress:
      vars:
        chart_version: "4.11.3"

    demo-app:
      vars:
        api_replicas: 1
        worker_replicas: 1
