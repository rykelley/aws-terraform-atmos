repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx

releases:
  - name: ingress-nginx
    namespace: ingress
    chart: ingress-nginx/ingress-nginx
    version: "{{ .Values.chart_version | default \"4.11.3\" }}"
    createNamespace: false
    wait: true
    timeout: 300
    values:
      - controller:
          replicaCount: {{ .Values.replicas | default 2 }}
          service:
            type: LoadBalancer
            annotations:
              service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
          metrics:
            enabled: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          admissionWebhooks:
            enabled: true
